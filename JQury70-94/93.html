<!DOCTYPE html>
<html>
<head>
  <script src="jquery-4.0.0.min.js"></script>
</head>
<body>
<span>привет</span>
<span>мир</span>
<span>jquery</span>
<span></span>
<span>  текст с пробелами  </span>
  <script>
const spans = $('span').toArray();
const capitalizedTexts = spans.map(span => {
  const text = $(span).text().trim();
  if (text.length === 0) return text;
  return text.charAt(0).toUpperCase() + text.slice(1);
});
console.log(capitalizedTexts.join(' '));
  </script>
</body>
</html>
